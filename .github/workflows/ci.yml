name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrateos-project

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: integrateos-project/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npx next lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npx next build
        env:
          # Build needs these to not fail on prisma migrate deploy
          # in the build script. We skip migrate in CI — just verify
          # the Next.js compilation succeeds.
          SKIP_ENV_VALIDATION: "1"
